<html lang="en">
<head>
    <title>WebRTC grabber</title>
    <style>
        body {
            margin: 0;
        }

        #main {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            padding: 4px 8px;
        }

        #participants {
            margin-bottom: 4px;
            grid-column-start: 1;
            grid-column-end: 3;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 5px;
        }

        .peerInfo {
            padding: 2px 8px;
        }

        .peerInfo button, .participantStatus button {
            margin-left: 4px;
            padding: 2px 8px;
        }

        .peerInfo a, .participantStatus a {
            margin-left: 4px;
        }

        .participantStatus {
            border: black 1px solid;
        }

        #participants .participantStatus {
            text-align: center;
        }

        .participantStatus.offline {
            background: #ff7272;
        }

        .participantStatus.disconnected {
            background: #ffff75;
        }

        .participantStatus.active {
            background: #91ff54;
        }

        .participantStatus.viewed {
            background: #e798ff;
        }

        .participantStatus.selected {
            background: #81b6ff;
        }

        #selectedParticipant {
            margin-bottom: 4px;
            grid-column-start: 1;
            grid-column-end: 3;
        }

        #video {
            width: 100%;
        }

        #footer {
            grid-column-start: 1;
            grid-column-end: 3;
        }

        .legend {
            padding-inline-start: 0;
            margin-block-start: 0;
            margin-block-end: 0;
        }

        .legend li {
            list-style: none;
            margin: 8px 0;
        }

        #proctoring {
            grid-column-start: 1;
            grid-column-end: 3;
            margin-bottom: 8px;
            padding: 8px 12px;
            border: 1px solid #888;
            border-radius: 4px;
            background: #f5f5f5;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }

        #proctoring.idle    { background: #f5f5f5; }
        #proctoring.active  { background: #c8f7c5; border-color: #2e8b2e; }
        #proctoring.paused  { background: #fff3a3; border-color: #b89c00; }

        #proctoring .status-label {
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #proctoring .params input {
            width: 90px;
            margin-right: 6px;
        }

        #proctoring button {
            padding: 4px 12px;
        }

        #proctoring .meta {
            color: #555;
            font-size: 0.9em;
        }
    </style>
    <script src="/sockets.js"></script>
    <script src="/grabber_player.js"></script>
    <script src="/grabber_admin_client.js"></script>
</head>
<body>
<div id="main">
    <div id="proctoring" class="idle">
        <span class="status-label">Proctoring: <span id="proctoring-state">idle</span></span>
        <span class="meta" id="proctoring-meta"></span>
        <span class="params" id="proctoring-params">
            <label>chunk ms <input id="proctoring-chunk" type="number" value="5000" min="1000" step="1000"></label>
            <label>fps <input id="proctoring-fps" type="number" value="1" min="1" max="30"></label>
            <label>bitrate <input id="proctoring-bitrate" type="number" value="100000" min="10000" step="10000"></label>
            <label>ends at <input id="proctoring-endsat" type="datetime-local"></label>
        </span>
        <span id="proctoring-buttons"></span>
    </div>
    <div id="participants"></div>
    <div id="selectedParticipant"></div>
    <div id="peers"></div>
    <div id="videoContainer">
        <video id="video"></video>
        <audio id="audio"></audio>
    </div>
    <div id="footer">
        Legend:
        <ul class="legend">
            <li><span class="participantStatus offline">offline</span> no pings yet</li>
            <li><span class="participantStatus disconnected">disconnected</span> last ping was 15 seconds ago</li>
            <li><span class="participantStatus active">active</span> last ping was earlier than 15 seconds ago</li>
            <li><span class="participantStatus viewed">viewed [connection count]</span> peer has at least one connection
            </li>
            <li><span class="participantStatus selected">selected</span> peer is selected</li>
        </ul>
    </div>
</div>
<script>
    const requireAuth = () => {
        if (localStorage.getItem("adminCredentials")) {
            return localStorage.getItem("adminCredentials");
        }
        const credentialInput = prompt("Admin credentials");
        localStorage.setItem("adminCredentials", credentialInput);
        return credentialInput;
    }

    let curGrabberId = null;
    let selectedParticipantName = null;

    const peerState = (peer) =>
        peer.lastPing ? ((new Date() - new Date(peer.lastPing)) < 15000 ? "active" : "disconnected") : "offline";

    const client = new GrabberPlayerClient();
    const adminClient = new GrabberAdminClient("");
    client.target.addEventListener("auth:request", () => {
        client.authorize(requireAuth());
        adminClient.setCredential(requireAuth());
    });
    client.target.addEventListener("auth:failed", ({detail: [accessMessage]}) => {
        localStorage.removeItem("adminCredentials");
        alert(accessMessage);
    });

    let proctoringCountdownTimer = null;
    const proctoringEl = {
        root:    document.getElementById("proctoring"),
        state:   document.getElementById("proctoring-state"),
        meta:    document.getElementById("proctoring-meta"),
        params:  document.getElementById("proctoring-params"),
        buttons: document.getElementById("proctoring-buttons"),
        chunk:   document.getElementById("proctoring-chunk"),
        fps:     document.getElementById("proctoring-fps"),
        bitrate: document.getElementById("proctoring-bitrate"),
        endsAt:  document.getElementById("proctoring-endsat"),
    };

    const renderProctoring = (state) => {
        const isIdle   = !state || !state.sessionId;
        const isActive = !!state && state.active;
        const isPaused = !!state && state.paused;

        proctoringEl.root.classList.remove("idle", "active", "paused");
        proctoringEl.root.classList.add(isIdle ? "idle" : isActive ? "active" : "paused");
        proctoringEl.state.innerText = isIdle ? "idle" : isActive ? "active" : "paused";

        proctoringEl.params.style.display = isIdle ? "" : "none";

        const meta = [];
        if (!isIdle) {
            meta.push(`session=${state.sessionId}`);
            meta.push(`fps=${state.fps}`, `chunk=${state.chunkDurationMs}ms`, `bitrate=${state.videoBitrate}`);
            if (state.startedAt) meta.push(`started=${new Date(state.startedAt).toLocaleTimeString()}`);
        }
        proctoringEl.meta.innerText = meta.join("  ");

        if (proctoringCountdownTimer) {
            clearInterval(proctoringCountdownTimer);
            proctoringCountdownTimer = null;
        }
        if (state && state.endsAt) {
            const tick = () => {
                const ms = new Date(state.endsAt) - new Date();
                if (ms <= 0) { proctoringEl.meta.innerText = meta.join("  "); return; }
                const s = Math.floor(ms / 1000);
                const mm = String(Math.floor(s / 60)).padStart(2, "0");
                const ss = String(s % 60).padStart(2, "0");
                proctoringEl.meta.innerText = meta.concat([`ends in ${mm}:${ss}`]).join("  ");
            };
            tick();
            proctoringCountdownTimer = setInterval(tick, 1000);
        }

        proctoringEl.buttons.innerHTML = "";
        const mkBtn = (label, fn) => {
            const b = document.createElement("button");
            b.innerText = label;
            b.onclick = async () => {
                b.disabled = true;
                try {
                    const res = await fn();
                    if (!res.ok) {
                        alert(`${label} failed: ${res.status} ${await res.text()}`);
                    }
                } finally { b.disabled = false; }
            };
            proctoringEl.buttons.appendChild(b);
        };
        if (isIdle) {
            mkBtn("Start", () => adminClient.proctoringStart({
                chunkDurationMs: parseInt(proctoringEl.chunk.value, 10),
                fps:             parseInt(proctoringEl.fps.value, 10),
                videoBitrate:    parseInt(proctoringEl.bitrate.value, 10),
                endsAt:          proctoringEl.endsAt.value ? new Date(proctoringEl.endsAt.value).toISOString() : null,
            }));
        } else if (isActive) {
            mkBtn("Pause", () => adminClient.proctoringPause());
            mkBtn("Stop",  () => adminClient.proctoringStop());
        } else {
            mkBtn("Resume", () => adminClient.proctoringResume());
            mkBtn("Stop",   () => adminClient.proctoringStop());
        }
    };

    client.target.addEventListener("proctoring", ({detail: [state]}) => renderProctoring(state));
    client.target.addEventListener("initialized", async () => {
        try {
            const resp = await adminClient.proctoringGet();
            renderProctoring(resp ? resp.state : null);
        } catch (e) { console.warn("failed to load initial proctoring state", e); }
    });
    renderProctoring(null);

    const renderParticipants = (peers, participantsStatus) => {
        const allPeersAnchor = document.getElementById("peers");
        allPeersAnchor.innerHTML = "";
        if (peers) {
            peers.sort((a, b) => a.name.localeCompare(b.name));
            peers.forEach((peer) => {
                allPeersAnchor.appendChild(renderPeerInfo(peer));
            });
        }

        const participantsStatusAnchor = document.getElementById("participants");
        participantsStatusAnchor.innerHTML = "";
        participantsStatus && participantsStatus.forEach((peer) => {
            const pStatus = document.createElement('div');
            pStatus.className = "participantStatus " + peerState(peer);
            pStatus.innerText = peer.name;
            if (peer.connectionsCount > 0) {
                pStatus.className += " viewed";
                pStatus.innerText += ` [${peer.connectionsCount}]`
            }
            if (peer.streamTypes) {
                pStatus.innerText += " " + peer.streamTypes.map(t => t.slice(0, 1).toUpperCase()).join("");
            }
            if (peer.currentRecordId) {
                pStatus.innerText += " ⦿";
            }
            if (peer.name === selectedParticipantName) {
                renderSelectedPeer(peer);
                pStatus.classList.add("selected");
            }
            pStatus.onclick = () => {
                if (selectedParticipantName === peer.name) {
                    selectedParticipantName = null;
                    pStatus.classList.remove("selected");
                    renderSelectedPeer(null);
                } else {
                    selectedParticipantName = peer.name;
                    pStatus.classList.add("selected");
                    renderSelectedPeer(peer);
                }
                renderParticipants(client.peersStatus, client.participantsStatus);
            };
            pStatus.style.cursor = "pointer";
            participantsStatusAnchor.appendChild(pStatus);
        });
    }
    const renderSelectedPeer = (peer) => {
        const anchor = document.getElementById("selectedParticipant");
        anchor.innerText = "";
        if (!peer) {
            return;
        }
        anchor.appendChild(renderPeerInfo(peer, true));
    }
    client.target.addEventListener("peers", ({detail: [peersStatus, participantsStatus]}) => {
        renderParticipants(peersStatus, participantsStatus);
    });

    const onPeerTrack = (track, peerId, streamType) => {
        console.log("got video track");
        const remoteVideo = document.getElementById("video");
        if (remoteVideo.srcObject !== track) {
            remoteVideo.srcObject = null;
            remoteVideo.srcObject = track;
            remoteVideo.play();
            console.log(`pc2 received remote stream (peerId ${peerId}) `, track);
        }
    };

    function renderPeerInfo(peer, isSelected) {
        const lastPingStr = peer.lastPing ? (new Date(peer.lastPing)).toLocaleString() : "never";
        const pStatus = document.createElement('div');
        if (isSelected) {
            pStatus.className += "peerInfo participantStatus " + peerState(peer);
        } else {
            pStatus.className += "peerInfo " + peerState(peer);
        }
        pStatus.innerText = `${peer.id ?? "???"} [${peer.name}] last ping: ${lastPingStr}`;

        const connectStreamButton = (streamType, isSpirit) => {
            const connectButton = document.createElement('button');
            connectButton.innerText = (isSpirit && "?" || "") + streamType;
            connectButton.onclick = () => client.connect({peerId: peer.id}, streamType, onPeerTrack);
            pStatus.appendChild(connectButton);
            const playerLink = document.createElement('a');
            playerLink.innerText = "" + (isSpirit && "?" || "") + streamType;
            playerLink.href = `${window.location}player?` +
                `peerName=${peer.name}&streamType=${streamType}&credential=${localStorage.getItem("adminCredentials")}`
            pStatus.appendChild(playerLink);
        }
        if (peer.streamTypes && peer.streamTypes.length > 0) {
            for (const streamType of peer.streamTypes) {
                connectStreamButton(streamType);
            }

            if (isSelected) {
                const recordButton = document.createElement('button');
                recordButton.innerText = "Record";
                recordButton.onclick = () => {
                    let recordId = prompt("Please enter record id", peer.name + "_test");
                    adminClient.recordStart(peer.name, recordId, 30 * 1000);
                }
                pStatus.appendChild(recordButton);

                if (peer.currentRecordId) {
                    const recordStopButton = document.createElement('button');
                    recordStopButton.innerText = "Stop Record";
                    recordStopButton.onclick = () => {
                        adminClient.recordStop(peer.name, peer.currentRecordId);
                    }
                    pStatus.appendChild(recordStopButton);
                }

                const recordUploadButton = document.createElement('button');
                recordUploadButton.innerText = "Record upload";
                recordUploadButton.onclick = () => {
                    let recordId = prompt("Please enter record id", peer.name + "_test");
                    adminClient.recordUpload(peer.name, recordId);
                }
                pStatus.appendChild(recordUploadButton);
            }
        } else {
            connectStreamButton("desktop", true);
            connectStreamButton("webcam", true);
        }
        return pStatus;
    }

    window.addEventListener("close", () => client.close());
</script>
</body>
</html>
