<!DOCTYPE html>
<html lang="en">

<head>
    <title>WebRTC grabber</title>
    <style>
        button {
            font-size: 24pt;
            text-decoration: none;
            display: inline-block;
            padding: 10px 30px;
            margin: 10px 20px;
            position: relative;
            overflow: hidden;
            border: 2px solid #b12a1c;
            border-radius: 8px;
            color: #b12a1c;
            transition: .2s ease-in-out;
            background: inherit;
        }

        button:hover {
            background: #b12a1c;
            color: #ffffff;
        }

        #captureButton:hover {
            color: #ffffff !important;
        }

        #captureButton.detecting {
            border-color: #4a82c3;
            color: #4a82c3;
        }

        #captureButton.detecting:hover {
            background: #4a82c3;
        }

        #captureButton.connecting {
            border-color: #fdba31;
            color: #fdba31;
        }

        #captureButton.connecting:hover {
            background: #fdba31;
        }

        #captureButton.active {
            border-color: #1eb11c;

        }

        }

        }

        <button id="allowAccess" style="display: none">Allow access</button>
        <button id="captureButton">Capture</button>
    </div>
</body>

</html>
<script>
    const webcamConstraint = { 
        width: { ideal: 1280 },
        height: { ideal: 720 },
        aspectRatio: 16 / 9,
        frameRate: { ideal: 30, max: 30 }
    };
    const desktopConstraint = {
        video: {
            displaySurface: "window",
            frameRate: { ideal: 30, max: 30 }
        }
    };

    class GrabberCaptureClient {
        constructor(peerName) {
            this.peerName = peerName;
            this.target = new EventTarget();
            this.signallingUrl = window.location.origin;

            const socketPath = "/ws/peers/" + peerName;

            this.socket = new GrabberSocket(socketPath);
            this.socket.on("connect", async () => {
                console.log("init socket", socketPath);
            });

            const init_peer_handle = function ({ initPeer: { pcConfig, pingInterval } }) {
                this.target.dispatchEvent(new CustomEvent('init_peer', { detail: { pcConfig, pingInterval } }));
            };
            const offer_handle = async function ({ offer: { peerId, offer, streamType } }) {
                this.target.dispatchEvent(new CustomEvent('offer', { detail: { playerId: peerId, offer, streamType } }));
            }
            const player_ice_handle = async function ({ ice: { peerId, candidate } }) {
                this.target.dispatchEvent(new CustomEvent('player_ice', { detail: { peerId, candidate } }));
            }
            const record_start_handle = async function ({ recordStart: { recordId, timeout, uploadToken } }) {
                this.target.dispatchEvent(new CustomEvent('record_start', { detail: { recordId, timeout, uploadToken } }));
            }
            const record_stop_handle = async function ({ recordStop: { recordId } }) {
                this.target.dispatchEvent(new CustomEvent('record_stop', { detail: { recordId } }));
            }
            const record_upload_handle = async function ({ recordUpload: { recordId } }) {
                this.target.dispatchEvent(new CustomEvent('record_upload', { detail: { recordId } }));
            }
            const players_disconnect_handle = async function ({ event }) {
                this.target.dispatchEvent(new CustomEvent("players_disconnect", { detail: {} }));
            }
            const proctoring_start_handle = function ({ proctoringStart }) {
                this.target.dispatchEvent(new CustomEvent('proctoring_start', { detail: proctoringStart }));
            };
            const proctoring_pause_handle = function () {
                this.target.dispatchEvent(new CustomEvent('proctoring_pause'));
            };
            const proctoring_resume_handle = function ({ proctoringResume }) {
                this.target.dispatchEvent(new CustomEvent('proctoring_resume', { detail: proctoringResume }));
            };
            const proctoring_stop_handle = function () {
                this.target.dispatchEvent(new CustomEvent('proctoring_stop'));
            };

            this.socket.on("init_peer", init_peer_handle.bind(this));
            this.socket.on("offer", offer_handle.bind(this));
            this.socket.on("player_ice", player_ice_handle.bind(this));
            this.socket.on("record_start", record_start_handle.bind(this));
            this.socket.on("record_stop", record_stop_handle.bind(this));
            this.socket.on("record_upload", record_upload_handle.bind(this));
            this.socket.on("players_disconnect", players_disconnect_handle.bind(this));
            this.socket.on("proctoring_start",  proctoring_start_handle.bind(this));
            this.socket.on("proctoring_pause",  proctoring_pause_handle.bind(this));
            this.socket.on("proctoring_resume", proctoring_resume_handle.bind(this));
            this.socket.on("proctoring_stop",   proctoring_stop_handle.bind(this));
        }

        send_ping(connectionsCount, streamTypes, currentRecordId, proctoringActiveStreams, proctoringHealth) {
            this.socket.emit("ping", {
                ping: {
                    connectionsCount: connectionsCount,
                    streamTypes: streamTypes,
                    currentRecordId: currentRecordId,
                    proctoringActiveStreams: proctoringActiveStreams || [],
                    proctoringHealth: proctoringHealth || [],
                }
            });
        }

        send_offer_answer(playerId, answer) {
            this.socket.emit("offer_answer", { offerAnswer: { peerId: playerId, answer } });
        }

        send_grabber_ice(peerId, candidate) {
            this.socket.emit("grabber_ice", { ice: { peerId, candidate } });
        }

        async record_upload(fileName, fileBlob, uploadToken) {
            const formData = new FormData();
            formData.append('file', fileBlob, fileName);

            const url = `${this.signallingUrl}/api/agent/${this.peerName}/record_upload`;
            const headers = uploadToken ? { 'X-Upload-Token': uploadToken } : {};
            return fetch(url, {
                method: "POST",
                body: formData,
                headers,
            });
        }
    }

    class RecordingManager {
        constructor() {
            this.activeRecording = {
                recorders: [],
                recordId: null,
                recordedChunks: new Map(),
                startTime: null,
                uploadToken: null,
            };
            this.recordingDuration = 0;
        }

        getSupportedMimeType(hasAudio) {
            const types = hasAudio 
                ? ['video/webm;codecs=vp8,opus', 'video/webm;codecs=vp9,opus', 'video/webm']
                : ['video/webm;codecs=vp8', 'video/webm;codecs=vp9', 'video/webm'];
            
            for (const type of types) {
                if (MediaRecorder.isTypeSupported(type)) {
                    console.log(`Using mime type: ${type}`);
                    return type;
                }
            }
            
            console.warn('No supported mime type found, using default');
            return '';
        }

        async startRecording(recordId, timeout, streams, uploadToken) {
            this.stopRecording(this.activeRecording.recordId);

            this.activeRecording.recordId = recordId;
            this.activeRecording.recorders = [];
            this.activeRecording.recordedChunks.clear();
            this.activeRecording.startTime = Date.now();
            this.activeRecording.uploadToken = uploadToken || null;

            for (const [streamKey, stream] of Object.entries(streams)) {
                let recordStream = stream;

                const chunks = [];
                this.activeRecording.recordedChunks.set(streamKey, chunks);

                const mimeType = this.getSupportedMimeType(recordStream.getAudioTracks().length > 0);
                console.log(`Creating recorder for ${streamKey} with mime type: ${mimeType}`);
                
                const options = {};
                if (mimeType) {
                    options.mimeType = mimeType;
                }
                
                let mediaRecorder;
                try {
                    mediaRecorder = new MediaRecorder(recordStream, options);
                } catch (e) {
                    console.error(`Failed to create MediaRecorder for ${streamKey}:`, e);
                    try {
                        mediaRecorder = new MediaRecorder(recordStream);
                        console.log(`Created MediaRecorder for ${streamKey} with default options`);
                    } catch (e2) {
                        console.error(`Failed to create MediaRecorder for ${streamKey} with defaults:`, e2);
                        continue;
                    }
                }

                mediaRecorder.addEventListener('dataavailable', event => {
                    if (event.data && event.data.size > 0) {
                        chunks.push(event.data);
                        console.log(`Chunk received for ${streamKey}: ${event.data.size} bytes (total: ${chunks.length})`);
                    }
                });

                mediaRecorder.addEventListener('stop', () => {
                    const totalSize = chunks.reduce((sum, chunk) => sum + chunk.size, 0);
                    console.log(`Recording stopped for ${streamKey}, chunks: ${chunks.length}, size: ${totalSize} bytes`);
                });

                mediaRecorder.addEventListener('error', (event) => {
                    console.error(`MediaRecorder error for ${streamKey}:`, event.error);
                });

                const videoTracks = recordStream.getVideoTracks();
                const audioTracks = recordStream.getAudioTracks();
                console.log(`${streamKey} - video: ${videoTracks.length}, audio: ${audioTracks.length}`);

                try {
                    mediaRecorder.start(1000);
                    this.activeRecording.recorders.push(mediaRecorder);
                    console.log(`Started recording ${recordId} [${streamKey}]`);
                } catch (e) {
                    console.error(`Failed to start recording for ${streamKey}:`, e);
                }
            }

            if (this.activeRecording.recorders.length === 0) {
                console.error('No recorders started!');
                this.activeRecording.recordId = null;
                this.activeRecording.startTime = null;
                return;
            }

            console.log(`Successfully started ${this.activeRecording.recorders.length} recorder(s)`);

            setTimeout(() => {
                console.log(`Timeout reached (${timeout}ms), stopping recording ${recordId}`);
                this.stopRecording(recordId);
            }, timeout);
        }

        stopRecording(recordId) {
            if (this.activeRecording.recordId === null || 
                this.activeRecording.recordId !== recordId) {
                return;
            }

            if (this.activeRecording.startTime) {
                this.recordingDuration = Date.now() - this.activeRecording.startTime;
                console.log(`Recording duration: ${this.recordingDuration}ms (${(this.recordingDuration / 1000).toFixed(2)}s)`);
            }

            console.log(`Stopping ${this.activeRecording.recorders.length} recorders for ${recordId}`);
            
            this.activeRecording.recorders.forEach((r, index) => {
                try {
                    if (r.state !== 'inactive') {
                        r.stop();
                    }
                } catch (e) {
                    console.error(`Error stopping recorder ${index}:`, e);
                }
            });
            
            this.activeRecording.recorders = [];
            this.activeRecording.recordId = null;
            this.activeRecording.startTime = null;
        }

        async uploadRecordings(recordId, client) {
    console.log('Waiting for final chunks...');
    await new Promise(resolve => setTimeout(resolve, 1000));
    
    const chunksMap = new Map(this.activeRecording.recordedChunks);
    const uploadToken = this.activeRecording.uploadToken;

    if (!chunksMap.size) {
        console.warn('No recordings to upload');
        return;
    }

    console.log(`Uploading recordings for ${recordId} (duration: ${this.recordingDuration}ms):`, 
        Array.from(chunksMap.entries()).map(([k, v]) => `${k}: ${v.length} chunks`));

    for (const [streamKey, chunks] of chunksMap.entries()) {
        if (chunks.length === 0) {
            console.warn(`No chunks for ${streamKey}, skipping upload`);
            continue;
        }

        let blob = new Blob(chunks, { type: 'video/webm' });
        
        if (typeof ysFixWebmDuration !== 'undefined' && this.recordingDuration > 0) {
            try {
                console.log(`Fixing WebM duration for ${streamKey}: ${this.recordingDuration}ms`);
                blob = await ysFixWebmDuration(blob, this.recordingDuration, { logger: false });
                console.log(`✓ Fixed WebM duration successfully`);
            } catch (e) {
                console.warn(`Failed to fix WebM duration: ${e}`);
            }
        }
        
        const fileName = `${recordId}_${streamKey}.webm`;
        
        console.log(`Uploading ${fileName}: ${chunks.length} chunks, ${blob.size} bytes, duration: ${this.recordingDuration}ms`);
        
        try {
            const response = await client.record_upload(fileName, blob, uploadToken);
            const text = await response.text();
            console.log(`Upload ${fileName} response: ${text}`);
        } catch (e) {
            console.error(`Failed to upload ${fileName}: ${e}`);
        }
    }
    
    this.activeRecording.recordedChunks.clear();
}
    }

    class ProctoringHealth {
        constructor(streamKey) {
            this.streamKey = streamKey;
            this.lastChunkAt = 0;
            this.chunksTotal = 0;
            this.bytesTotal = 0;
            this.recorderState = '';
            this.lastError = '';
            this.restartCount = 0;
            this.droppedChunks = 0;
            this.queueDepth = 0;
            this.mimeType = '';
            this.browser = ProctoringHealth.detectBrowser();
        }

        static detectBrowser() {
            const ua = navigator.userAgent;
            if (/Firefox\//.test(ua)) return 'firefox';
            if (/Edg\//.test(ua)) return 'edge';
            if (/Chrome\//.test(ua) && !/Edg\//.test(ua)) return 'chrome';
            if (/Safari\//.test(ua) && !/Chrome\//.test(ua)) return 'safari';
            return 'other';
        }

        recordChunk(byteSize) {
            this.lastChunkAt = Date.now();
            this.chunksTotal++;
            this.bytesTotal += byteSize;
            this.lastError = '';
        }

        recordError(msg) { this.lastError = String(msg).slice(0, 200); }
        incRestart() { this.restartCount++; }
        incDrop(n = 1) { this.droppedChunks += n; }

        snapshot() {
            return {
                streamKey: this.streamKey,
                lastChunkAt: this.lastChunkAt,
                chunksTotal: this.chunksTotal,
                bytesTotal: this.bytesTotal,
                recorderState: this.recorderState,
                lastError: this.lastError,
                restartCount: this.restartCount,
                droppedChunks: this.droppedChunks,
                queueDepth: this.queueDepth,
                browser: this.browser,
                mimeType: this.mimeType,
            };
        }
    }

    class ProctoringQueue {
        constructor(dbName = 'webrtc-grabber-proctoring', maxBytes = 200 * 1024 * 1024) {
            this.dbName = dbName;
            this.maxBytes = maxBytes;
            this.dbPromise = this._open();
            this.lastDepth = 0;
            this.droppedTotal = 0;
            this.lastDroppedSeq = -1;
            this.estimateBytes = 0;
            this._refreshEstimate();
        }

        _open() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(this.dbName, 1);
                req.onupgradeneeded = () => {
                    const db = req.result;
                    if (!db.objectStoreNames.contains('chunks')) {
                        db.createObjectStore('chunks', { keyPath: 'id', autoIncrement: true });
                    }
                };
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        async _store(mode) {
            const db = await this.dbPromise;
            return db.transaction('chunks', mode).objectStore('chunks');
        }

        // Drop oldest entries until the running byte estimate is at or below
        // maxBytes. Caller already holds the 'readwrite' store context.
        _evictUntilFit(store) {
            return new Promise((resolve, reject) => {
                if (this.estimateBytes <= this.maxBytes) {
                    resolve(0);
                    return;
                }
                let dropped = 0;
                const cursorReq = store.openCursor();
                cursorReq.onerror = () => reject(cursorReq.error);
                cursorReq.onsuccess = () => {
                    const cursor = cursorReq.result;
                    if (!cursor) {
                        resolve(dropped);
                        return;
                    }
                    const v = cursor.value;
                    const size = (v && v.blob && v.blob.size) || 0;
                    if (this.estimateBytes <= this.maxBytes) {
                        resolve(dropped);
                        return;
                    }
                    cursor.delete();
                    dropped++;
                    this.droppedTotal++;
                    if (v && Number.isFinite(v.seq)) this.lastDroppedSeq = v.seq;
                    this.estimateBytes -= size;
                    cursor.continue();
                };
            });
        }

        async _refreshEstimate() {
            try {
                const store = await this._store('readonly');
                const totalSize = await new Promise((resolve, reject) => {
                    const req = store.openCursor();
                    let sum = 0;
                    req.onsuccess = () => {
                        const c = req.result;
                        if (!c) { resolve(sum); return; }
                        const v = c.value;
                        sum += (v && v.blob && v.blob.size) || 0;
                        c.continue();
                    };
                    req.onerror = () => reject(req.error);
                });
                this.estimateBytes = totalSize;
                this.lastDepth = await this.size();
            } catch (e) {
                console.warn('proctoring queue: estimate refresh failed', e);
            }
        }

        async enqueue(item) {
            const db = await this.dbPromise;
            return new Promise((resolve, reject) => {
                const tx = db.transaction('chunks', 'readwrite');
                const store = tx.objectStore('chunks');
                const addReq = store.add(item);
                addReq.onerror = () => reject(addReq.error);
                tx.oncomplete = async () => {
                    this.estimateBytes += (item.blob && item.blob.size) || 0;
                    // Evict oldest while still over the cap. Run in a fresh
                    // transaction to avoid re-using the completed one.
                    try {
                        if (this.estimateBytes > this.maxBytes) {
                            await this._evictOldestUntilFit();
                        }
                        this.lastDepth = await this.size();
                    } catch (e) {
                        console.warn('proctoring queue: post-enqueue evict failed', e);
                    }
                    resolve(addReq.result);
                };
                tx.onerror = () => reject(tx.error);
            });
        }

        async _evictOldestUntilFit() {
            const db = await this.dbPromise;
            return new Promise((resolve, reject) => {
                const tx = db.transaction('chunks', 'readwrite');
                const store = tx.objectStore('chunks');
                const cursorReq = store.openCursor();
                let dropped = 0;
                cursorReq.onerror = () => reject(cursorReq.error);
                cursorReq.onsuccess = () => {
                    const cursor = cursorReq.result;
                    if (!cursor) {
                        tx.oncomplete = () => resolve(dropped);
                        return;
                    }
                    if (this.estimateBytes <= this.maxBytes) {
                        tx.oncomplete = () => resolve(dropped);
                        return;
                    }
                    const v = cursor.value;
                    const size = (v && v.blob && v.blob.size) || 0;
                    cursor.delete();
                    dropped++;
                    this.droppedTotal++;
                    if (v && Number.isFinite(v.seq)) this.lastDroppedSeq = v.seq;
                    this.estimateBytes -= size;
                    cursor.continue();
                };
            });
        }

        async peek() {
            const store = await this._store('readonly');
            return new Promise((resolve, reject) => {
                const req = store.openCursor();
                req.onsuccess = () => resolve(req.result ? req.result.value : null);
                req.onerror = () => reject(req.error);
            });
        }

        async remove(id) {
            const store = await this._store('readwrite');
            return new Promise((resolve, reject) => {
                const req = store.delete(id);
                req.onsuccess = async () => {
                    resolve();
                    try { this.lastDepth = await this.size(); } catch (e) {}
                };
                req.onerror = () => reject(req.error);
            });
        }

        async size() {
            const store = await this._store('readonly');
            return new Promise((resolve, reject) => {
                const req = store.count();
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }
    }

    class ProctoringUploader {
        constructor({ signallingUrl, peerName, streamKey, queue }) {
            this.signallingUrl = signallingUrl;
            this.peerName = peerName;
            this.streamKey = streamKey;
            this.queue = queue;
            this.running = false;
            this.attempt = 0;
            this.uploadToken = null;
            this.lastKnownCommitted = -1;
        }

        setUploadToken(token) {
            this.uploadToken = token || null;
        }

        _authHeaders() {
            return this.uploadToken ? { 'X-Upload-Token': this.uploadToken } : {};
        }

        async _backoff(label) {
            this.attempt++;
            const base = Math.min(Math.pow(2, this.attempt) * 1000, 5 * 60 * 1000);
            const delay = base / 2 + Math.random() * (base / 2);
            console.warn(`proctoring[${this.streamKey}] ${label} (attempt ${this.attempt}), retry in ${Math.round(delay)}ms`);
            await new Promise(r => setTimeout(r, delay));
        }

        kick() {
            if (this.running) return;
            this.running = true;
            (async () => {
                try {
                    while (true) {
                        const item = await this.queue.peek();
                        if (!item) break;
                        // If the head is ahead of what the server has, the
                        // gap in between was lost (evicted from the bounded
                        // queue under network pressure, or session resumed
                        // mid-stream). Send an explicit advance marker so the
                        // server closes the gap atomically with the upload.
                        let advanceToSeq = null;
                        if (Number.isFinite(item.seq)
                            && this.lastKnownCommitted >= 0
                            && item.seq > this.lastKnownCommitted + 1) {
                            advanceToSeq = item.seq;
                            console.warn(`proctoring[${this.streamKey}] gap detected: committed=${this.lastKnownCommitted}, head.seq=${item.seq} → advancing`);
                        }
                        let outcome;
                        try {
                            outcome = await this._upload(item, advanceToSeq);
                        } catch (e) {
                            await this._backoff(`upload failed: ${e}`);
                            continue;
                        }
                        if (outcome === 'ok' || outcome === 'drop') {
                            await this.queue.remove(item.id);
                            this.attempt = 0;
                            if (Number.isFinite(item.seq) && item.seq > this.lastKnownCommitted) {
                                this.lastKnownCommitted = item.seq;
                            }
                            continue;
                        }
                        // outcome === 'conflict'
                        let progressed = false;
                        try {
                            progressed = await this._reconcile(item.sessionId);
                        } catch (e) {
                            console.warn(`proctoring[${this.streamKey}] reconcile failed`, e);
                        }
                        if (progressed) {
                            this.attempt = 0;
                        } else {
                            await this._backoff('conflict not resolved');
                        }
                    }
                } finally {
                    this.running = false;
                }
            })();
        }

        async _upload({ sessionId, seq, segment, blob }, advanceToSeq) {
            const fd = new FormData();
            fd.append('file', blob, `${seq}.webm`);
            let url = `${this.signallingUrl}/api/agent/${this.peerName}/proctoring_upload`
                + `?sessionId=${encodeURIComponent(sessionId)}`
                + `&streamKey=${encodeURIComponent(this.streamKey)}`
                + `&seq=${encodeURIComponent(seq)}`;
            if (segment != null && Number.isFinite(segment)) {
                url += `&segment=${encodeURIComponent(segment)}`;
            }
            if (advanceToSeq != null && Number.isFinite(advanceToSeq)) {
                url += `&advanceToSeq=${encodeURIComponent(advanceToSeq)}`;
            }
            const res = await fetch(url, { method: 'POST', body: fd, headers: this._authHeaders() });
            if (res.ok) return 'ok';
            if (res.status === 409) return 'conflict';
            if (res.status === 400 || res.status === 413 || res.status === 415) {
                const body = await res.text().catch(() => '');
                console.error(`proctoring[${this.streamKey}] permanent ${res.status} seq=${seq}, dropping: ${body}`);
                return 'drop';
            }
            throw new Error(`status ${res.status}: ${await res.text().catch(() => '')}`);
        }

        async _reconcile(sessionId) {
            const url = `${this.signallingUrl}/api/agent/${this.peerName}/proctoring_state`
                + `?sessionId=${encodeURIComponent(sessionId)}`
                + `&streamKey=${encodeURIComponent(this.streamKey)}`;
            const res = await fetch(url, { headers: this._authHeaders() });
            if (!res.ok) throw new Error(`state fetch: status ${res.status}`);
            const state = await res.json();
            const committed = state.committedSeq;
            this.lastKnownCommitted = committed;
            let dropped = 0;
            while (true) {
                const head = await this.queue.peek();
                if (!head || head.sessionId !== sessionId || head.seq > committed) break;
                await this.queue.remove(head.id);
                dropped++;
            }
            console.log(`proctoring[${this.streamKey}] reconcile: committedSeq=${committed}, dropped ${dropped} stale chunks`);
            return dropped > 0;
        }
    }

    class ProctoringManager {
        constructor({ signallingUrl, peerName, streamKey, onSourceLost }) {
            this.peerName = peerName;
            this.streamKey = streamKey;
            this.queue = new ProctoringQueue(`webrtc-grabber-proctoring-${peerName}-${streamKey}`);
            this.uploader = new ProctoringUploader({ signallingUrl, peerName, streamKey, queue: this.queue });
            this.cfg = null;
            this.video = null;
            this.canvas = null;
            this.canvasCtx = null;
            this.canvasStream = null;
            this.recordedStream = null;
            this.recorder = null;
            this.drawTimer = null;
            this.seq = 0;
            this.seqStorageKey = null;
            this.streamingActive = false;
            this.trackListeners = [];
            this.health = new ProctoringHealth(streamKey);
            this.sourceStream = null;
            this.watchdogTimer = null;
            this.restartInFlight = false;
            this.lastRecorderStartAt = 0;
            this.segmentIndex = 0;
            this.segmentStorageKey = null;
            this.segmentStartedAt = 0;
            this.segmentRotateTimer = null;
            this.segmentRotateMs = 10 * 60 * 1000;
            this.onSourceLost = onSourceLost || null;
            this.waitingForSource = false;
            this.uploader.kick();
        }

        isStreaming() { return this.streamingActive; }

        getHealth() {
            this.health.recorderState = this.recorder ? this.recorder.state : (this.streamingActive ? 'unknown' : 'inactive');
            this.health.queueDepth = this.queue.lastDepth;
            if (this.queue.droppedTotal > this.health.droppedChunks) {
                this.health.droppedChunks = this.queue.droppedTotal;
            }
            return this.health.snapshot();
        }

        _seqKey(sessionId) {
            return `proctoring_next_seq:${this.peerName}:${this.streamKey}:${sessionId}`;
        }

        _trackEndedSubscribe(track, handler) {
            track.addEventListener('ended', handler);
            this.trackListeners.push({ track, handler });
        }

        _clearTrackListeners() {
            for (const { track, handler } of this.trackListeners) {
                try { track.removeEventListener('ended', handler); } catch (e) {}
            }
            this.trackListeners = [];
        }

        async start(cfg, sourceStream) {
            // If the previous session was a different one, clear its persisted seq.
            // For the same sessionId (e.g. a fallback from resume after track end),
            // we must NOT clear so the seq counter survives the pipeline rebuild —
            // otherwise the relay drops every chunk until seq passes committedSeq.
            const sameSession = this.cfg && this.cfg.sessionId === cfg.sessionId;
            if (!sameSession) await this.stop();
            else this._destroyPipeline();

            this.cfg = cfg;
            this.sourceStream = sourceStream;
            this.uploader.setUploadToken(cfg.uploadTokens && cfg.uploadTokens[this.streamKey]);
            this.seqStorageKey = this._seqKey(cfg.sessionId);
            const saved = parseInt(localStorage.getItem(this.seqStorageKey), 10);
            this.seq = Number.isFinite(saved) && saved >= 0 ? saved : 0;
            this.segmentStorageKey = this._segmentKey(cfg.sessionId);
            const savedSeg = parseInt(localStorage.getItem(this.segmentStorageKey), 10);
            this.segmentIndex = Number.isFinite(savedSeg) && savedSeg >= 0 ? savedSeg : 0;
            this.segmentStartedAt = Date.now();
            console.log(`proctoring[${this.streamKey}]: starting session=${cfg.sessionId} from seq=${this.seq} segment=${this.segmentIndex}`);
            await this._initPipeline(sourceStream);
        }

        _segmentKey(sessionId) {
            return `proctoring_segment:${this.peerName}:${this.streamKey}:${sessionId}`;
        }

        async _initPipeline(sourceStream) {
            if (sourceStream) this.sourceStream = sourceStream;
            const videoTrack = this.sourceStream && this.sourceStream.getVideoTracks().find(t => t.readyState === 'live');
            const audioTrack = this.sourceStream && this.sourceStream.getAudioTracks().find(t => t.readyState === 'live');

            if (!videoTrack) {
                console.warn(`proctoring[${this.streamKey}]: no live video track, aborting`);
                this.health.recordError('no live video track');
                return;
            }

            this.recordedStream = new MediaStream();

            const videoOnlyStream = new MediaStream([videoTrack]);
            const video = document.createElement('video');
            video.muted = true;
            video.srcObject = videoOnlyStream;
            await video.play().catch(e => console.warn(`proctoring[${this.streamKey}] video play failed`, e));
            this.video = video;

            const settings = videoTrack.getSettings();
            const w = settings.width  || video.videoWidth  || 1280;
            const h = settings.height || video.videoHeight || 720;

            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            this.canvas = canvas;
            this.canvasCtx = canvas.getContext('2d');

            const drawIntervalMs = Math.max(1, Math.floor(1000 / this.cfg.fps));
            this.drawTimer = setInterval(() => {
                try { this.canvasCtx.drawImage(this.video, 0, 0, canvas.width, canvas.height); }
                catch (e) {}
            }, drawIntervalMs);

            this.canvasStream = canvas.captureStream(this.cfg.fps);
            this.canvasStream.getVideoTracks().forEach(t => this.recordedStream.addTrack(t));

            this._trackEndedSubscribe(videoTrack, () => {
                console.warn(`proctoring[${this.streamKey}]: video track ended; attempting pipeline restart`);
                this.health.recordError('video track ended');
                this._scheduleRestart('video track ended');
            });

            if (audioTrack) {
                this.recordedStream.addTrack(audioTrack);
                this._trackEndedSubscribe(audioTrack, () => {
                    console.warn(`proctoring[${this.streamKey}]: audio track ended; continuing without audio`);
                    this.health.recordError('audio track ended');
                });
            }

            this._startRecorder();
            this._startWatchdog();
        }

        _startRecorder() {
            const hasAudio = this.recordedStream && this.recordedStream.getAudioTracks().length > 0;
            const candidates = hasAudio
                ? ['video/webm;codecs=vp8,opus', 'video/webm;codecs=vp9,opus', 'video/webm']
                : ['video/webm;codecs=vp8', 'video/webm;codecs=vp9', 'video/webm'];
            const mimeType = candidates.find(t => MediaRecorder.isTypeSupported(t)) || '';

            let recorder;
            try {
                const opts = { videoBitsPerSecond: this.cfg.videoBitrate };
                if (mimeType) opts.mimeType = mimeType;
                if (hasAudio) opts.audioBitsPerSecond = 64000;
                recorder = new MediaRecorder(this.recordedStream, opts);
            } catch (e) {
                console.error(`proctoring[${this.streamKey}] failed to create MediaRecorder`, e);
                this.health.recordError(`MediaRecorder create failed: ${e.message || e}`);
                return;
            }
            this.recorder = recorder;
            this.health.mimeType = mimeType || 'default';
            this.health.recorderState = recorder.state;
            this.streamingActive = true;
            this.lastRecorderStartAt = Date.now();
            this.segmentStartedAt = Date.now();

            const sessionId = this.cfg.sessionId;
            const streamKey = this.streamKey;
            recorder.addEventListener('dataavailable', async (e) => {
                if (!e.data || !e.data.size) return;
                this.health.recordChunk(e.data.size);
                const seq = this.seq++;
                const segment = this.segmentIndex;
                try {
                    await this.queue.enqueue({ sessionId, seq, segment, streamKey, blob: e.data, createdAt: Date.now() });
                    if (this.seqStorageKey) localStorage.setItem(this.seqStorageKey, String(this.seq));
                    this.uploader.kick();
                } catch (err) {
                    console.error(`proctoring[${streamKey}] enqueue failed`, err);
                    this.health.recordError(`enqueue failed: ${err.message || err}`);
                    this.health.incDrop();
                }
            });
            recorder.addEventListener('error', e => {
                const msg = (e && e.error && (e.error.message || e.error.name)) || 'recorder error';
                console.error(`proctoring[${streamKey}] recorder error`, e && e.error);
                this.health.recordError(`recorder error: ${msg}`);
            });
            recorder.addEventListener('stop', () => {
                this.health.recorderState = 'stopped';
            });

            try {
                recorder.start(this.cfg.chunkDurationMs);
                this.health.recorderState = recorder.state;
                console.log(`proctoring[${streamKey}] started: session=${sessionId} seg=${this.segmentIndex} fps=${this.cfg.fps} chunk=${this.cfg.chunkDurationMs}ms mime=${mimeType}`);
            } catch (e) {
                console.error(`proctoring[${streamKey}] failed to start recorder`, e);
                this.health.recordError(`recorder start failed: ${e.message || e}`);
            }

            this._startSegmentRotateTimer();
        }

        _startSegmentRotateTimer() {
            this._stopSegmentRotateTimer();
            this.segmentRotateTimer = setInterval(() => {
                if (!this.cfg || !this.streamingActive) return;
                const elapsed = Date.now() - this.segmentStartedAt;
                if (elapsed >= this.segmentRotateMs) {
                    this._scheduleRestart(`segment rotation after ${Math.round(elapsed / 1000)}s`);
                }
            }, 60 * 1000);
        }

        _stopSegmentRotateTimer() {
            if (this.segmentRotateTimer) {
                clearInterval(this.segmentRotateTimer);
                this.segmentRotateTimer = null;
            }
        }

        _startWatchdog() {
            this._stopWatchdog();
            const tickMs = 1000;
            this.watchdogTimer = setInterval(() => this._watchdogTick(), tickMs);
        }

        _stopWatchdog() {
            if (this.watchdogTimer) {
                clearInterval(this.watchdogTimer);
                this.watchdogTimer = null;
            }
        }

        _watchdogTick() {
            if (!this.cfg || !this.streamingActive) return;
            // Recorder went inactive without us noticing — force restart.
            if (this.recorder && this.recorder.state === 'inactive') {
                this._scheduleRestart('recorder inactive');
                return;
            }
            const last = this.health.lastChunkAt;
            if (!last) {
                // No chunk yet — give it time. If more than 3x chunkMs passed
                // since the recorder started without a single byte, it's dead.
                const sinceStart = Date.now() - this.lastRecorderStartAt;
                if (sinceStart > Math.max(this.cfg.chunkDurationMs * 3, 10000)) {
                    this._scheduleRestart('no chunks since start');
                }
                return;
            }
            const staleAfter = Math.max(this.cfg.chunkDurationMs * 2, 5000);
            const since = Date.now() - last;
            if (since > staleAfter) {
                this._scheduleRestart(`no data for ${since}ms`);
            }
        }

        _scheduleRestart(reason) {
            if (this.restartInFlight) return;
            const videoTrack = this.sourceStream && this.sourceStream.getVideoTracks().find(t => t.readyState === 'live');
            if (!videoTrack) {
                console.warn(`proctoring[${this.streamKey}] source video track not live (reason: ${reason})`);
                this.health.recordError(`source lost (${reason})`);
                this.streamingActive = false;
                this.waitingForSource = true;
                if (this.onSourceLost) {
                    try { this.onSourceLost(this.streamKey, reason); }
                    catch (e) { console.error(`proctoring[${this.streamKey}] onSourceLost handler failed`, e); }
                }
                return;
            }
            this.restartInFlight = true;
            this.health.incRestart();
            this.health.recordError(`restart: ${reason}`);
            console.warn(`proctoring[${this.streamKey}] watchdog: ${reason}, rebuilding pipeline`);
            this._restart()
                .catch(e => {
                    console.error(`proctoring[${this.streamKey}] restart failed`, e);
                    this.health.recordError(`restart failed: ${e.message || e}`);
                })
                .finally(() => { this.restartInFlight = false; });
        }

        // Replace the underlying source stream after the previous one died
        // (e.g. webcam unplugged, screen-share revoked). The pipeline is
        // rebuilt with the new stream; sessionId and seq counter survive.
        async replaceSource(newStream) {
            if (!newStream || !newStream.getVideoTracks().some(t => t.readyState === 'live')) {
                console.warn(`proctoring[${this.streamKey}] replaceSource: new stream has no live video track`);
                return false;
            }
            const cfg = this.cfg;
            if (!cfg) {
                console.warn(`proctoring[${this.streamKey}] replaceSource: no active cfg`);
                return false;
            }
            this.restartInFlight = true;
            try {
                this._destroyPipeline();
                this.sourceStream = newStream;
                this.waitingForSource = false;
                await this._rotateSegmentIndexAndInit(newStream);
                console.log(`proctoring[${this.streamKey}] source replaced, pipeline rebuilt`);
                return true;
            } catch (e) {
                console.error(`proctoring[${this.streamKey}] replaceSource failed`, e);
                this.health.recordError(`replaceSource failed: ${e.message || e}`);
                return false;
            } finally {
                this.restartInFlight = false;
            }
        }

        async _restart() {
            // Rebuild the recorder/canvas pipeline using the same session and
            // seq counter. The source stream is *not* re-acquired here — that
            // is the responsibility of upstream (track-ended recovery, see
            // replaceSource) so we only act when the source is still live.
            const sourceStream = this.sourceStream;
            const cfg = this.cfg;
            if (!sourceStream || !cfg) return;
            this._destroyPipeline();
            await this._rotateSegmentIndexAndInit(sourceStream, 'restart');
        }

        // Shared rebuild routine: rotates the segment index (mandatory on
        // every recorder rebuild — a fresh MediaRecorder emits a new WebM
        // EBML header that cannot be appended to the previous segment) and
        // re-initialises the canvas+recorder pipeline. The seq counter is
        // left untouched, so the server keeps strict in-order delivery
        // across segments.
        async _rotateSegmentIndexAndInit(sourceStream, reason) {
            this._rotateSegmentIndex(reason);
            await new Promise(r => setTimeout(r, 500));
            await this._initPipeline(sourceStream);
        }

        _rotateSegmentIndex(reason) {
            this.segmentIndex++;
            this.segmentStartedAt = Date.now();
            if (this.segmentStorageKey) localStorage.setItem(this.segmentStorageKey, String(this.segmentIndex));
            console.log(`proctoring[${this.streamKey}] segment rotated to ${this.segmentIndex} (${reason})`);
        }

        // Pause without tearing down the recorder so resume can reuse the same
        // WebM byte stream (and the same seq counter). A torn-down recorder
        // would emit a fresh WebM header on the next chunk, corrupting the
        // appended file, and the seq sequence on the relay would reset to 0
        // (silently dropped because seq <= committedSeq).
        pause() {
            if (this.recorder && this.recorder.state === 'recording') {
                try { this.recorder.pause(); } catch (e) {}
            }
            this.streamingActive = false;
            this.health.recorderState = this.recorder ? this.recorder.state : 'paused';
            console.log(`proctoring[${this.streamKey}] paused`);
        }

        resume() {
            if (this.recorder && this.recorder.state === 'paused') {
                try { this.recorder.resume(); } catch (e) {
                    console.warn(`proctoring[${this.streamKey}] resume failed`, e);
                    this.health.recordError(`resume failed: ${e.message || e}`);
                    return false;
                }
                this.streamingActive = true;
                this.health.recorderState = this.recorder.state;
                console.log(`proctoring[${this.streamKey}] resumed`);
                return true;
            }
            return false;
        }

        _teardownRecorder() {
            if (this.recorder && this.recorder.state !== 'inactive') {
                try { this.recorder.requestData(); } catch (e) {}
                try { this.recorder.stop(); } catch (e) {}
            }
            this.recorder = null;
            this.streamingActive = false;
            this.health.recorderState = 'inactive';
        }

        _destroyPipeline() {
            this._stopWatchdog();
            this._stopSegmentRotateTimer();
            this._teardownRecorder();
            this._clearTrackListeners();
            if (this.drawTimer) { clearInterval(this.drawTimer); this.drawTimer = null; }
            if (this.canvasStream) {
                try { this.canvasStream.getTracks().forEach(t => t.stop()); } catch (e) {}
                this.canvasStream = null;
            }
            this.recordedStream = null;
            if (this.video) {
                try { this.video.srcObject = null; } catch (e) {}
                this.video = null;
            }
            this.canvas = null;
            this.canvasCtx = null;
        }

        async stop() {
            this._destroyPipeline();
            if (this.seqStorageKey) {
                localStorage.removeItem(this.seqStorageKey);
                this.seqStorageKey = null;
            }
            if (this.segmentStorageKey) {
                localStorage.removeItem(this.segmentStorageKey);
                this.segmentStorageKey = null;
            }
            this.cfg = null;
            this.sourceStream = null;
        }
    }

    class ProctoringSession {
        constructor({ signallingUrl, peerName, onSourceLost }) {
            this.signallingUrl = signallingUrl;
            this.peerName = peerName;
            this.onSourceLost = onSourceLost || null;
            this.managers = new Map(); // streamKey -> ProctoringManager
        }

        _ensure(streamKey) {
            let m = this.managers.get(streamKey);
            if (!m) {
                m = new ProctoringManager({
                    signallingUrl: this.signallingUrl,
                    peerName: this.peerName,
                    streamKey,
                    onSourceLost: this.onSourceLost
                        ? (sk, reason) => this.onSourceLost(sk, reason)
                        : null,
                });
                this.managers.set(streamKey, m);
            }
            return m;
        }

        getActiveStreams() {
            const out = [];
            for (const [key, m] of this.managers) {
                if (m.isStreaming()) out.push(key);
            }
            return out;
        }

        getHealth() {
            const out = [];
            for (const m of this.managers.values()) out.push(m.getHealth());
            return out;
        }

        async start(cfg, streams) {
            const promises = [];
            for (const [key, stream] of Object.entries(streams)) {
                if (!stream.getVideoTracks().some(t => t.readyState === 'live')) continue;
                promises.push(this._ensure(key).start(cfg, stream).catch(e => console.error(`proctoring[${key}] start failed`, e)));
            }
            await Promise.all(promises);
        }

        async replaceSource(streamKey, newStream) {
            const m = this.managers.get(streamKey);
            if (!m) return false;
            return m.replaceSource(newStream);
        }

        pause() {
            for (const m of this.managers.values()) m.pause();
        }

        async resume(cfg, streams) {
            // For each manager: try MediaRecorder.resume() (cheap, keeps WebM
            // stream). Fall back to a full start if the recorder was torn down
            // (e.g. track ended during the pause, or this session is new).
            const promises = [];
            for (const [key, stream] of Object.entries(streams)) {
                if (!stream.getVideoTracks().some(t => t.readyState === 'live')) continue;
                const m = this._ensure(key);
                const sameSession = m.cfg && cfg && m.cfg.sessionId === cfg.sessionId;
                if (sameSession && m.resume()) continue;
                promises.push(m.start(cfg, stream).catch(e => console.error(`proctoring[${key}] resume failed`, e)));
            }
            await Promise.all(promises);
        }

        async stop() {
            const ps = [];
            for (const m of this.managers.values()) ps.push(m.stop());
            await Promise.all(ps);
        }
    }

    const probeCapabilities = () => {
        const caps = {
            browser: ProctoringHealth.detectBrowser(),
            mediaRecorder: typeof MediaRecorder !== 'undefined',
            canvasCaptureStream: typeof HTMLCanvasElement !== 'undefined'
                && typeof HTMLCanvasElement.prototype.captureStream === 'function',
            wakeLock: !!(navigator.wakeLock && navigator.wakeLock.request),
            rVFC: typeof HTMLVideoElement !== 'undefined'
                && typeof HTMLVideoElement.prototype.requestVideoFrameCallback === 'function',
            indexedDB: typeof indexedDB !== 'undefined',
            mimeType: '',
        };

        const candidates = [
            'video/webm;codecs=vp8,opus',
            'video/webm;codecs=vp8',
            'video/webm;codecs=vp9,opus',
            'video/webm',
        ];
        for (const t of candidates) {
            if (caps.mediaRecorder && MediaRecorder.isTypeSupported(t)) {
                caps.mimeType = t;
                break;
            }
        }
        return caps;
    };

    const assertSupportedBrowser = () => {
        const b = ProctoringHealth.detectBrowser();
        if (b === 'safari') {
            const msg = 'Safari is not supported for proctoring. Use Chrome, Edge or Firefox.';
            console.error(msg);
            alert(msg);
            return false;
        }
        if (!MediaRecorder || !HTMLCanvasElement.prototype.captureStream) {
            const msg = 'Browser lacks required APIs (MediaRecorder / canvas.captureStream). Use a current Chrome, Edge or Firefox.';
            console.error(msg);
            alert(msg);
            return false;
        }
        return true;
    };

    let capabilities = null;
    let activeWakeLock = null;
    const requestWakeLock = async () => {
        if (!navigator.wakeLock) return;
        try {
            if (activeWakeLock && activeWakeLock.released === false) return;
            activeWakeLock = await navigator.wakeLock.request('screen');
            if (activeWakeLock) {
                activeWakeLock.addEventListener('release', () => { activeWakeLock = null; });
            }
            console.log('proctoring: screen wake lock acquired');
        } catch (e) {
            console.warn('proctoring: wakeLock failed', e);
        }
    };
    const onVisibilityChange = () => {
        if (document.visibilityState === 'visible') requestWakeLock();
    };

    const extractArguments = () => {
        const params = new URLSearchParams(window.location.search);
        if (!params.has("peerName")) {
            alert("Invalid parameters. No peerName argument");
        }
        return { peerName: params.get("peerName") };
    }
    const connectionArgs = extractArguments();

    function isSafari() {
        return /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
    }

    const askForAccess = () => new Promise(resolve => {
        const accessButton = document.getElementById('allowAccess');
        const captureButton = document.getElementById('captureButton');
        accessButton.style.display = 'inline-block';
        captureButton.style.display = 'none';
        accessButton.onclick = () => {
            accessButton.style.display = 'none';
            captureButton.style.display = 'inline-block';
            resolve();
        };
    });

    const detectStreams = async () => {
        const detectedStreams = {};

        const webcamStream = await navigator.mediaDevices.getUserMedia({
            video: webcamConstraint,
            audio: true,
        }).catch(() => undefined);
        
        if (webcamStream) {
            detectedStreams["webcam"] = webcamStream;
        }

        if (desktopConstraint) {
            if (isSafari()) {
                await askForAccess();
            }
            const desktopStream = await navigator.mediaDevices.getDisplayMedia(desktopConstraint).catch(() => undefined);
            if (desktopStream) {
                detectedStreams["desktop"] = desktopStream;
            }
        }

        return detectedStreams;
    }

    let currentState = null;
    const updateState = (newState) => {
        currentState = newState;
        const captureButton = document.getElementById("captureButton");
        captureButton.className = newState;
        if (newState === "connecting") {
            captureButton.innerText = "connecting ...";
        } else if (newState === "active") {
            captureButton.innerText = "OK";
        } else if (newState === "recording") {
            captureButton.innerText = "Recording";
        }
    }

    const capture = async () => {
        if (currentState !== null) return;
        if (!assertSupportedBrowser()) return;
        updateState("detecting");

        capabilities = probeCapabilities();
        console.log('proctoring: capabilities', capabilities);
        document.addEventListener('visibilitychange', onVisibilityChange);
        await requestWakeLock();

        const streams = await detectStreams();
        for (const [key, stream] of Object.entries(streams)) {
            stream.getTracks().forEach(track => {
                track.addEventListener('ended', () => {
                    console.warn(`stream "${key}" ${track.kind} track ended`);
                });
            });
        }
        const liveStreamTypes = () => Object.entries(streams)
            .filter(([_, s]) => s.getVideoTracks().some(t => t.readyState === 'live'))
            .map(([k]) => k);
        const pcs = new Map();
        const recordingManager = new RecordingManager();
        let peerConnectionConfig = undefined;
        let pingTimerId = undefined;

        updateState("connecting");
        const client = new GrabberCaptureClient(connectionArgs.peerName);

        // Track pending source-loss recoveries so we can re-acquire sources
        // automatically where possible (webcam) or prompt for a user gesture
        // when required (getDisplayMedia cannot run without one).
        const showSourceLossBanner = (streamKey, reason, onRecover) => {
            let banner = document.getElementById('source-loss-banner');
            if (!banner) {
                banner = document.createElement('div');
                banner.id = 'source-loss-banner';
                banner.style.cssText = [
                    'position:fixed', 'top:0', 'left:0', 'right:0',
                    'background:#b12a1c', 'color:#fff', 'padding:12px 20px',
                    'font:14pt sans-serif', 'z-index:99999',
                    'display:flex', 'align-items:center', 'gap:16px',
                    'box-shadow:0 2px 12px rgba(0,0,0,.4)',
                ].join(';');
                document.body.appendChild(banner);
            }
            banner.innerHTML = '';
            const text = document.createElement('span');
            text.style.flex = '1';
            text.textContent = `Stream "${streamKey}" ended (${reason}). Proctoring is paused for this stream.`;
            banner.appendChild(text);
            const btn = document.createElement('button');
            btn.textContent = `Re-share ${streamKey}`;
            btn.style.cssText = 'font:14pt sans-serif;padding:6px 16px;cursor:pointer;border:0;border-radius:4px;background:#fff;color:#b12a1c';
            btn.onclick = async () => {
                btn.disabled = true;
                btn.textContent = 'Working...';
                try {
                    const ok = await onRecover();
                    if (ok) banner.remove();
                    else btn.textContent = `Retry ${streamKey}`;
                } catch (e) {
                    console.error('recover failed', e);
                    btn.textContent = `Retry ${streamKey}`;
                } finally {
                    btn.disabled = false;
                }
            };
            banner.appendChild(btn);
        };

        const recoverStream = async (streamKey) => {
            // Webcam: try automatic re-acquire (getUserMedia does not need a
            // user gesture in most browsers once the permission was granted).
            // Desktop: getDisplayMedia MUST be called from a user gesture, so
            // this function is only invoked from the banner button onclick.
            try {
                if (streamKey === 'webcam') {
                    const newStream = await navigator.mediaDevices.getUserMedia({
                        video: webcamConstraint, audio: true,
                    }).catch(() => undefined);
                    if (!newStream) return false;
                    streams[streamKey] = newStream;
                } else if (streamKey === 'desktop' && desktopConstraint) {
                    const newStream = await navigator.mediaDevices.getDisplayMedia(desktopConstraint).catch(() => undefined);
                    if (!newStream) return false;
                    streams[streamKey] = newStream;
                } else {
                    return false;
                }
                const ok = await proctoringSession.replaceSource(streamKey, streams[streamKey]);
                if (!ok) {
                    console.warn(`proctoring[${streamKey}] replaceSource returned false`);
                    return false;
                }
                return true;
            } catch (e) {
                console.error(`proctoring[${streamKey}] recoverStream failed`, e);
                return false;
            }
        };

        const proctoringSession = new ProctoringSession({
            signallingUrl: client.signallingUrl,
            peerName: connectionArgs.peerName,
            onSourceLost: async (streamKey, reason) => {
                console.warn(`proctoring source lost: ${streamKey} (${reason})`);
                if (streamKey === 'webcam') {
                    // Try automatic re-acquire first — most browsers allow it
                    // after the initial permission grant.
                    const ok = await recoverStream(streamKey);
                    if (ok) {
                        console.log(`proctoring[${streamKey}] auto-recovered`);
                        return;
                    }
                }
                // Desktop (or auto-recovery failed): surface a banner with a
                // button so the user can supply the required gesture.
                showSourceLossBanner(streamKey, reason, () => recoverStream(streamKey));
            },
        });

        client.target.addEventListener("init_peer", async ({ detail: { pcConfig, pingInterval } }) => {
            peerConnectionConfig = pcConfig;
            pingInterval = pingInterval ?? 3000;
            if (pingTimerId) {
                clearInterval(pingTimerId);
            }
            pingTimerId = setInterval(() => {
                client.send_ping(
                    pcs.size,
                    liveStreamTypes(),
                    recordingManager.activeRecording.recordId,
                    proctoringSession.getActiveStreams(),
                    proctoringSession.getHealth(),
                );
            }, pingInterval);
            console.log(`init peer (pingInterval = ${pingInterval})`);
            updateState("active");
        });

        client.target.addEventListener("offer", async ({ detail: { playerId, offer, streamType } }) => {
            console.log(`create new peer connection for ${playerId}`);
            pcs.set(playerId, new RTCPeerConnection(peerConnectionConfig));
            const pc = pcs.get(playerId);

            streamType = streamType ?? "desktop";
            const stream = streams[streamType];
            if (stream) {
                stream.getTracks().forEach(track => {
                    pc.addTrack(track, stream);
                });
            } else {
                console.warn(`No such ${streamType} as captured stream`);
            }

            pc.addEventListener("icecandidate", (event) => {
                client.send_grabber_ice(playerId, event.candidate);
            });

            pc.addEventListener('connectionstatechange', ({ target: connection }) => {
                console.log(`change player ${playerId} connection state ${connection.connectionState}`);
                if (connection.connectionState === "failed") {
                    connection.close();
                    pcs.delete(playerId);
                    console.log(`close connection for ${playerId}`);
                }
            });

            await pc.setRemoteDescription(offer);
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);

            client.send_offer_answer(playerId, answer);
        });

        client.target.addEventListener('player_ice', async ({ detail: { peerId, candidate } }) => {
            pcs.get(peerId).addIceCandidate(candidate)
                .then(() => console.log(`add player_ice from ${peerId}`));
        });

        client.target.addEventListener('record_start', async ({ detail: { recordId, timeout, uploadToken } }) => {
            console.log(`Start recording: ${recordId}, timeout: ${timeout}ms`);
            updateState("recording");
            await recordingManager.startRecording(recordId, timeout, streams, uploadToken);
        });

        client.target.addEventListener('record_stop', async ({ detail: { recordId } }) => {
            console.log(`Stop recording: ${recordId}`);
            recordingManager.stopRecording(recordId);
            updateState("active");
        });

        client.target.addEventListener('record_upload', async ({ detail: { recordId } }) => {
            console.log(`Upload recording: ${recordId}`);
            await recordingManager.uploadRecordings(recordId, client);
        });

        client.target.addEventListener('proctoring_start', async ({ detail: cfg }) => {
            try {
                await proctoringSession.start(cfg, streams);
            } catch (e) {
                console.error('failed to start proctoring', e);
            }
        });

        client.target.addEventListener('proctoring_pause', () => {
            proctoringSession.pause();
        });

        client.target.addEventListener('proctoring_resume', async ({ detail: cfg }) => {
            try {
                await proctoringSession.resume(cfg, streams);
            } catch (e) {
                console.error('failed to resume proctoring', e);
            }
        });

        client.target.addEventListener('proctoring_stop', async () => {
            await proctoringSession.stop();
        });

        client.target.addEventListener('players_disconnect', async () => {
            console.log("Players disconnected");
            pcs.forEach((connection, playerId) => {
                try {
                    connection.close();
                } catch (e) {
                    console.error(`Failed to close connection for ${playerId}`);
                }
            });
            pcs.clear();
            recordingManager.stopRecording(recordingManager.activeRecording.recordId);
        });
    };

    document.getElementById("captureButton").addEventListener("click", capture);
</script>
