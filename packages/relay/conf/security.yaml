# Security configuration
# All fields are optional - defaults will be used if not specified

# adminCredential: "live"
# tlsCrtFile: "/path/to/cert.crt"
# tlsKeyFile: "/path/to/key.key"

# ── Login page (optional) ─────────────────────────────────────────────────────
# When authEnabled is true, the root page "/" becomes a login form:
#   - Admin logs in with `adminLogin` (default "admin") + `adminCredential`
#     above, and is sent to the dashboard at /admin.
#   - A student logs in with their participant name + that participant's
#     `password` (see below), and is sent to /capture?peerName=<name>.
# A signed, HttpOnly cookie then authorizes the capture WebSocket
# (/ws/peers/:name): without a valid token for that exact name, publishing is
# rejected. When authEnabled is false (default) nothing changes: "/" serves the
# dashboard and the capture page stays open.
authEnabled: false 
# adminLogin: "admin"

# HMAC secret for signing record/proctoring upload tokens.
# If unset, a random secret is generated on every restart and previously-issued
# tokens become invalid. Set to a stable value in production so agents can
# survive relay restarts. Use 32+ random bytes (e.g. `openssl rand -hex 32`).
uploadSecret: "b378cf87386ecee47c77ad19e2fb75a9d0e7f7051f8b22427bab1d4fc3278c62"

# Participants can be a plain string (just a peer name) or an object with
# optional teamName/university metadata that will show up in the dashboard.
# When authEnabled is true, add a `password` per participant — that is what the
# student types (with their name as the login) to reach their capture page.
# Participants without a password cannot log in. The password is never sent to
# any client.
participants:
  - name: "001"
    teamName: "Team 001"
    university: "ITMO University"
    password: "change-me-001"
  - name: "002"
    teamName: "Team 002"
    university: "ITMO University"
    password: "change-me-002"
  - name: "003"
    teamName: "Team 003"
    university: "ITMO University"
  - name: "004"
    teamName: "Team 004"
    university: "ITMO University"
  - name: "005"
    teamName: "Team 005"
    university: "ITMO University"
  - name: "006"
    teamName: "Team 006"
    university: "ITMO University"
  - name: "007"
    teamName: "Team 007"
    university: "ITMO University"
  - name: "008"
    teamName: "Team 008"
    university: "ITMO University"

